<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#0f0c29"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="2" fill="#fff"/>
  <circle cx="80" cy="25" r="1.5" fill="#fff"/>
  <circle cx="90" cy="70" r="1" fill="#fff"/>
  <circle cx="15" cy="85" r="2" fill="#fff"/>
  <!-- Center planet -->
  <circle cx="50" cy="50" r="25" fill="url(#starGrad)"/>
  <!-- Orbit -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#5e72e4" stroke-width="1" opacity="0.5"/>
</svg>
