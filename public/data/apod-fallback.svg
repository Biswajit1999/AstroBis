<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NASA APOD snapshot placeholder</title>
  <desc id="desc">Dark starfield placeholder shown only when the local NASA Astronomy Picture of the Day image snapshot is unavailable.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="48%">
      <stop offset="0%" stop-color="#7358d8" stop-opacity=".30"/>
      <stop offset="45%" stop-color="#19214c" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#04050f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090a1d"/>
      <stop offset="100%" stop-color="#02020a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <g fill="#dbeafe" opacity=".75">
    <circle cx="110" cy="124" r="1.5"/><circle cx="218" cy="312" r="2"/><circle cx="376" cy="114" r="1"/>
    <circle cx="490" cy="216" r="1.8"/><circle cx="615" cy="92" r="1.2"/><circle cx="739" cy="316" r="1.4"/>
    <circle cx="870" cy="160" r="1.5"/><circle cx="1030" cy="274" r="1.1"/><circle cx="1160" cy="98" r="2"/>
    <circle cx="1320" cy="240" r="1.5"/><circle cx="1460" cy="148" r="1"/><circle cx="1520" cy="420" r="1.6"/>
    <circle cx="180" cy="690" r="1.1"/><circle cx="338" cy="792" r="1.8"/><circle cx="550" cy="620" r="1.3"/>
    <circle cx="720" cy="760" r="1.4"/><circle cx="920" cy="638" r="1.1"/><circle cx="1134" cy="720" r="1.6"/>
    <circle cx="1376" cy="690" r="1.3"/><circle cx="1500" cy="790" r="1.7"/>
  </g>
  <g transform="translate(800 454)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <text y="-12" fill="#ffffff" font-size="36" font-weight="700">NASA APOD snapshot unavailable</text>
    <text y="32" fill="#a8b3d9" font-size="20">Run the AstroBis data refresh to cache today's image locally.</text>
  </g>
</svg>
